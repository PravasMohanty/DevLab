apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-service-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: simulation-service

  template:
    metadata:
      labels:
        app: simulation-service

    spec:
      containers:
      - name: simulation-service
        image: simulation-service:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SIMULATION_SERVICE_PORT
        ports:
        - containerPort: 4000

---

apiVersion: v1
kind: Service

metadata:
  name: simulation-service

spec:
  type: ClusterIP

  selector:
    app: simulation-service

  ports:
  - protocol: TCP
    port: 80
    targetPort: 4000
    nodePort: 4000