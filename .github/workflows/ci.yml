name: DevLab CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & verify each service individually
  # ──────────────────────────────────────────────
  build-simulation-service:
    name: Build Simulation Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: simulation-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: simulation-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

  # ──────────────────────────────────────────────
  # Job 2: Docker build — verify Dockerfiles work
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-simulation-service, build-api-gateway]

    steps:
      - uses: actions/checkout@v4

      - name: Build simulation-service image
        run: docker build -t devlab-simulation-service ./simulation-service

      - name: Build api-gateway image
        run: docker build -t devlab-api-gateway ./api-gateway

  # ──────────────────────────────────────────────
  # Job 3: Integration test — full pipeline via
  #         Docker Compose
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start services with Docker Compose
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          timeout=120
          elapsed=0
          until docker compose ps --format json | grep -q '"Health":"healthy"' && \
                [ "$(docker compose ps --format json | grep -c '"Health":"healthy"')" -eq 2 ]; do
            if [ $elapsed -ge $timeout ]; then
              echo "❌ Timed out waiting for services to be healthy"
              echo ""
              echo "=== Docker Compose Status ==="
              docker compose ps
              echo ""
              echo "=== Simulation Service Logs ==="
              docker compose logs simulation-service
              echo ""
              echo "=== API Gateway Logs ==="
              docker compose logs api-gateway
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
            echo "  Waiting... (${elapsed}s / ${timeout}s)"
          done
          echo "✅ All services healthy!"

      - name: Run integration tests
        run: node api-gateway/test-gateway.js http://localhost:3500

      - name: Show service logs
        if: always()
        run: |
          echo "=== Simulation Service Logs ==="
          docker compose logs simulation-service
          echo ""
          echo "=== API Gateway Logs ==="
          docker compose logs api-gateway

      - name: Tear down services
        if: always()
        run: docker compose down --volumes --remove-orphans
