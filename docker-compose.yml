services:
  simulation-service:
    build: ./simulation-service
    container_name: devlab-simulation-service
    environment:
      - PORT=4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devlab-network

  api-gateway:
    build: ./api-gateway
    container_name: devlab-api-gateway
    environment:
      - PORT=3500
      - SIMULATION_SERVICE_URL=http://simulation-service:4000
    ports:
      - "3500:3500"
    depends_on:
      simulation-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3500/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devlab-network

networks:
  devlab-network:
    driver: bridge
